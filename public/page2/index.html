<script>window.addEventListener('load',()=>{const video=document.getElementById('mainVideo');const poster=document.getElementById('videoPoster');const loader=document.getElementById('loadingOverlay');const btn=document.getElementById('unmuteBtn');video.muted=true;video.play().catch(()=>{});function reveal(){setTimeout(()=>{if(loader)loader.style.display='none';if(poster){poster.style.transition='opacity .25s';poster.style.opacity='0';setTimeout(()=>poster.remove(),250);}btn.style.display='block';},600);}video.addEventListener('playing',reveal,{once:true});video.addEventListener('timeupdate',()=>{if(video.currentTime>0.05)reveal();},{once:true});btn.onclick=()=>{video.muted=false;btn.style.display='none';};});</script>
